<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <link rel="apple-touch-icon" href="icon/icon-512x512.png" />
  <meta name="theme-color" content="#23272a" />
  <link rel="manifest" href="manifest.json" />
  <meta charset="UTF-8" />
  <title>登入 / 註冊 - SimpleChat</title>
  <link rel="stylesheet" href="style2.css" />
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h2 id="formTitle" style="margin-bottom: 24px;">登入 SimpleChat</h2>
    <input type="email" id="email" placeholder="電子郵件" style="margin: 0 0 16px 0;" />
    <div class="password-wrapper" style="margin: 0 0 16px 0;">
      <input type="password" id="password" placeholder="密碼(至少6碼)" style="margin: 0;" />
      <span id="togglePassword">👁️</span>
    </div>
    <div id="forgotContainer" style="text-align: left; margin-top: -8px; margin-bottom: 24px; padding-left: 4px;">
      <span id="forgot" style="color: #9aa7bd; text-decoration: underline; cursor: pointer; font-size: 13px;">忘記密碼？</span>
    </div>
    <input type="text" id="nickname" placeholder="暱稱（3–24 字）" style="display:none; margin: 0 0 24px 0;" />
    <button id="submitBtn">登入</button>
    <div class="toggle" id="toggleForm" style="margin-top: 16px;">點此<span class="blue" style="text-decoration: underline; font-weight: bold; font-size: 15px; margin-left: 4px;">註冊 / 登入</span></div>
    <div id="errorMsg" class="error"></div>
  </div>
  <div id="modalOverlay" class="modal-overlay hidden"></div>
  <div id="customModal" class="popup hidden"></div>
  <script type="module">
    import { auth, db } from './firebase.js';
    import {
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      sendEmailVerification,
      sendPasswordResetEmail
    } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js';
    import { ref, set, runTransaction } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js';

    const email = document.getElementById('email');
    const password = document.getElementById('password');
    const nickname = document.getElementById('nickname');
    const submitBtn = document.getElementById('submitBtn');
    const toggleForm = document.getElementById('toggleForm');
    const formTitle = document.getElementById('formTitle');
    const errorMsg = document.getElementById('errorMsg');
    const infoMsg = document.getElementById('infoMsg');
    const togglePwd = document.getElementById('togglePassword');
    const forgot = document.getElementById('forgot');
    const modalOverlay = document.getElementById('modalOverlay');
    const customModal = document.getElementById('customModal');

    let isLogin = true;
    const REDIRECT_GUARD_KEY = 'signupInProgress';

    function showModal({ title, content, confirmText = '確定', cancelText = '取消', showCancel = false }) {
      return new Promise((resolve) => {
        customModal.innerHTML = `
          <div class="modal-content">
            <div class="modal-title">${title}</div>
            <div class="modal-body">${content}</div>
            <div class="modal-actions">
              <button class="confirm">${confirmText}</button>
              ${showCancel ? `<button class="cancel">${cancelText}</button>` : ''}
            </div>
          </div>`;
        modalOverlay.classList.remove('hidden');
        customModal.classList.remove('hidden');
        const confirmBtn = customModal.querySelector('.confirm');
        const cancelBtn = customModal.querySelector('.cancel');
        confirmBtn.onclick = () => {
          modalOverlay.classList.add('hidden');
          customModal.classList.add('hidden');
          resolve(true);
        };
        if (cancelBtn) {
          cancelBtn.onclick = () => {
            modalOverlay.classList.add('hidden');
            customModal.classList.add('hidden');
            resolve(false);
          };
        }
      });
    }

    togglePwd.addEventListener('click', () => {
      password.type = password.type === 'password' ? 'text' : 'password';
    });

    toggleForm.addEventListener('click', () => {
      isLogin = !isLogin;
      formTitle.textContent = isLogin ? '登入 SimpleChat' : '註冊 SimpleChat';
      submitBtn.textContent = isLogin ? '登入' : '註冊';
      nickname.style.display = isLogin ? 'none' : 'block';
      document.getElementById('forgotContainer').style.display = isLogin ? 'block' : 'none';
      errorMsg.textContent = '';
    });

    forgot.addEventListener('click', async () => {
      errorMsg.textContent = '';
      const emailVal = (email.value || '').trim();
      if (!emailVal) { errorMsg.textContent = '請先輸入電子郵件再按重設'; return; }
      
      const ok = await showModal({ 
        title: '確認重設密碼', 
        content: `確定要發送密碼重設信件至 <b>${emailVal}</b> 嗎？`, 
        showCancel: true 
      });
      if (!ok) return;

      try {
        await sendPasswordResetEmail(auth, emailVal);
        await showModal({ title: '通知', content: '重設密碼連結已寄出，請查收郵件。' });
      } catch (err) {
        errorMsg.textContent = mapAuthErrorToZh(err);
      }
    });

    submitBtn.addEventListener('click', handleSubmit);
    [email, password, nickname].forEach((el) => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSubmit(); });
    });

    async function handleSubmit() {
      errorMsg.textContent = '';
      const emailVal = (email.value || '').trim();
      const pwdVal = (password.value || '').trim();
      const nick = (nickname.value || '').trim();
      if (!emailVal || !pwdVal || (!isLogin && !nick)) {
        errorMsg.textContent = '請完整填寫所有欄位';
        return;
      }
      submitBtn.disabled = true;
      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, emailVal, pwdVal);
          window.location.href = 'chat.html';
        } else {
          sessionStorage.setItem(REDIRECT_GUARD_KEY, '1');
          if (nick.length < 3 || nick.length > 24) {
            errorMsg.textContent = '暱稱需 3–24 字';
            submitBtn.disabled = false;
            sessionStorage.removeItem(REDIRECT_GUARD_KEY);
            return;
          }
          const lower = nick.toLowerCase();
          const cred = await createUserWithEmailAndPassword(auth, emailVal, pwdVal);
          const uid = cred.user.uid;
          let reservedLower = null;
          const res = await runTransaction(ref(db, `nicknames/${lower}`), (cur) => {
            if (cur === null || cur === uid) return uid;
            return;
          });
          if (!res.committed) throw new Error('暱稱已被使用，請換一個');
          reservedLower = lower;
          try {
            await set(ref(db, `users/${uid}/profile`), {
              nickname: nick,
              nicknameLower: lower,
              registeredAt: Date.now()
            });
            await set(ref(db, `users/${uid}/private`), { email: emailVal });
          } catch (e) {
            if (reservedLower) {
              try {
                await runTransaction(ref(db, `nicknames/${reservedLower}`), (cur) => (cur === uid ? null : cur));
              } catch { }
            }
            throw e;
          }
          try {
            await sendEmailVerification(cred.user);
            await showModal({ title: '註冊成功', content: '驗證信已寄出，請到信箱收信完成驗證。' });
          } catch {
            await showModal({ title: '通知', content: '驗證信寄送失敗，可在聊天室右上角再寄一次' });
          }
          localStorage.setItem('pendingNickname', nick);
          sessionStorage.removeItem(REDIRECT_GUARD_KEY);
          window.location.href = 'chat.html';
        }
      } catch (err) {
        errorMsg.textContent = mapAuthErrorToZh(err);
        submitBtn.disabled = false;
        sessionStorage.removeItem(REDIRECT_GUARD_KEY);
      }
    }

    onAuthStateChanged(auth, (u) => {
      const signingUp = sessionStorage.getItem(REDIRECT_GUARD_KEY) === '1';
      if (u && !signingUp) {
        window.location.replace('chat.html');
      }
    });

    function mapAuthErrorToZh(error) {
      const code = error?.code || '';
      switch (code) {
        case 'auth/invalid-email': return '電子郵件格式不正確';
        case 'auth/email-already-in-use': return '此信箱已被註冊';
        case 'auth/user-not-found': return '帳號不存在';
        case 'auth/wrong-password': return '密碼錯誤';
        case 'auth/weak-password': return '密碼需至少 6 碼';
        case 'auth/network-request-failed': return '網路異常，請檢查連線';
        case 'auth/invalid-login-credentials': return '帳號或密碼錯誤';
        case 'auth/too-many-requests': return '嘗試過於頻繁，請稍後再試';
        default: return `發生錯誤：${error?.message || String(error)}`;
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
  <div id="aki-footer">Made by Aki</div>
  <script>
    (function () {
      const footer = document.getElementById('aki-footer');
      if (footer) {
        const text = footer.textContent;
        footer.textContent = '';
        const spans = [];
        for (let char of text) {
          const span = document.createElement('span');
          span.textContent = char;
          if (char === ' ') span.style.width = '0.5em';
          span.className = 'char-span';
          footer.appendChild(span);
          spans.push(span);
        }
        document.addEventListener('mousemove', (e) => {
          const mouseX = e.clientX;
          const mouseY = e.clientY;
          spans.forEach(span => {
            const rect = span.getBoundingClientRect();
            const charX = rect.left + rect.width / 2;
            const charY = rect.top + rect.height / 2;
            const distX = mouseX - charX;
            const distY = mouseY - charY;
            const distance = Math.sqrt(distX * distX + distY * distY);
            const maxDist = 60;
            if (distance < maxDist) {
              const force = (maxDist - distance) / maxDist;
              const moveX = -(distX / distance) * force * 10;
              const moveY = -(distY / distance) * force * 10;
              span.style.transform = `translate(${moveX}px, ${moveY}px)`;
            } else {
              span.style.transform = `translate(0, 0)`;
            }
          });
        });
      }
    })();
  </script>
</body>

</html>
