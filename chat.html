<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <link rel="apple-touch-icon" href="icon/icon-512x512.png" />
  <meta name="theme-color" content="#23272a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SimpleChat</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="favicon.ico" />
</head>

<body>
  <div class="header-bar">
    <button id="toggleSidebarBtn" class="hamburger-btn" aria-label="選單">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="header-brand" id="brandBtn">SimpleChat</div>
    <div class="header-right">
      <input id="newNickname" maxlength="24" placeholder="更改暱稱（3–24 字）" />
      <button id="saveNickname">更新</button>
      <button id="logout" class="danger">登出</button>
    </div>
  </div>
  <div class="app sidebar-open">
    <aside class="sidebar">
      <div class="sidebar-content">
        <div id="userListContainer">
          <div class="userlist-loading" style="padding: 6px 8px;">載入使用者列表中...</div>
        </div>
      </div>
      <div id="adminPanel" class="hidden">
        <button id="profileBtnAdmin" class="profile-btn self-profile-btn"></button>
        <button id="manageBtn">成員管理</button>
      </div>
      <div id="sidebarProfile" class="sidebar-profile hidden">
        <button id="profileBtnNormal" class="profile-btn self-profile-btn"></button>
      </div>
    </aside>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <main class="main">
      <header class="topbar">
        <div class="left">
          <div id="verifyBanner" class="banner hidden">
            尚未完成 Email 驗證，驗證前無法發話。若未收到驗證信，您可以 ->
            <button id="resendVerify" class="linklike">重新寄送驗證信</button>
          </div>
          <div id="banBanner" class="banner hidden">你已被管理員封鎖，無法發話。</div>
          <div id="notificationBanner" class="banner hidden" style="background:#5865f2;border-left:4px solid #fff;padding:4px 8px;">
            <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:8px;">
              <div>
                開啟系統通知以接收新訊息提醒 -> 
                <button id="enableNotifications" class="linklike" style="color:#fff;font-weight:bold;text-decoration:underline;">開啟通知</button>
              </div>
              <button id="closeNotificationBanner">✕</button>
            </div>
          </div>
        </div>
      </header>
      <div id="selectBar" class="select-bar hidden">
        <span class="select-bar-text">已選取 0 條訊息</span>
        <div style="display:flex;gap:8px;">
          <button id="selectDeleteBtn" class="danger">刪除</button>
          <button id="selectCancelBtn">取消</button>
        </div>
      </div>
      <div style="position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column;">
        <section id="messages" class="chat-box" aria-live="polite" aria-label="聊天訊息"></section>
        <div class="chat-loading-placeholder" id="chatLoadingPlaceholder">
          <div class="chat-loading-spinner"></div>
          <span>連線並載入訊息中...</span>
        </div>
      </div>
      <div id="unreadBanner" class="unread-banner hidden">
        <span id="unreadCountText">有 1 則新訊息</span>
        <svg class="unread-arrow" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" fill="currentColor"/></svg>
      </div>
      <div class="input-area">
        <div class="input-container">
          <div id="mentionList" class="mention-list hidden"></div>
          <div id="emojiPanel" class="emoji-panel hidden">
            <div class="emoji-header">
              <div class="emoji-tabs">
                <button id="tabEmoji" class="emoji-tab active">表情符號</button>
                <button id="tabGif" class="emoji-tab">GIF</button>
              </div>
              <button id="emojiClose" class="emoji-close-btn">✕</button>
            </div>
            <div id="emojiContainer" class="emoji-container">
              <div class="emoji-grid"></div>
            </div>
            <div id="gifContainer" class="gif-container hidden">
              <div class="gif-search-box">
                <input type="text" id="gifSearchInput" placeholder="搜尋 GIF..." autocomplete="off">
              </div>
              <div class="gif-grid" id="gifGrid"></div>
            </div>
          </div>
          <div id="messageInput" contenteditable="false" role="textbox" aria-multiline="true" spellcheck="false"
            data-placeholder="載入中..."></div>
        </div>
        <button id="emojiBtn" type="button" class="emoji-btn" disabled>
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="8.5" cy="10" r="1.2" fill="currentColor" />
            <circle cx="15.5" cy="10" r="1.2" fill="currentColor" />
            <path d="M8 14.5c0 0 1.5 2.5 4 2.5s4-2.5 4-2.5" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" />
          </svg>
        </button>
        <button id="sendBtn" type="button" disabled>
          <svg viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </main>
  </div>
  <div id="modalOverlay" class="modal-overlay hidden"></div>
  <div id="customModal" class="popup hidden"></div>
  <div id="userCard" class="popup hidden"></div>
  <div id="profileModal" class="profile-modal hidden"></div>
  <div id="cropModal" class="crop-modal hidden"></div>
  <input type="file" id="avatarFileInput" accept="image/*" style="display:none;">
  <script type="module">
    import { auth, db, storage } from './firebase.js';
    import { onAuthStateChanged, signOut, sendEmailVerification, reload, deleteUser } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js';
    import { ref, push, onChildAdded, onChildRemoved, query, orderByChild, limitToLast, get, onValue, remove, update, runTransaction, set, startAt, endBefore, onDisconnect, serverTimestamp, goOffline, goOnline } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js';
    import { ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-storage.js';

    const elements = {
      messagesBox: document.getElementById('messages'),
      inputEl: document.getElementById('messageInput'),
      sendBtn: document.getElementById('sendBtn'),
      userListContainer: document.getElementById('userListContainer'),
      verifyBanner: document.getElementById('verifyBanner'),
      banBanner: document.getElementById('banBanner'),
      notificationBanner: document.getElementById('notificationBanner'),
      enableNotificationsBtn: document.getElementById('enableNotifications'),
      resendVerify: document.getElementById('resendVerify'),
      newNickEl: document.getElementById('newNickname'),
      saveNickBtn: document.getElementById('saveNickname'),
      logoutBtn: document.getElementById('logout'),
      userCard: document.getElementById('userCard'),
      brandBtn: document.getElementById('brandBtn'),
      adminPanel: document.getElementById('adminPanel'),
      manageBtn: document.getElementById('manageBtn'),
      modalOverlay: document.getElementById('modalOverlay'),
      customModal: document.getElementById('customModal'),
      mentionList: document.getElementById('mentionList'),
      toggleSidebarBtn: document.getElementById('toggleSidebarBtn'),
      profileModal: document.getElementById('profileModal'),
      cropModal: document.getElementById('cropModal'),
      avatarFileInput: document.getElementById('avatarFileInput'),
      selectBar: document.getElementById('selectBar'),
      selectDeleteBtn: document.getElementById('selectDeleteBtn'),
      selectCancelBtn: document.getElementById('selectCancelBtn'),
      sidebarProfile: document.getElementById('sidebarProfile'),
      profileBtnAdmin: document.getElementById('profileBtnAdmin'),
      profileBtnNormal: document.getElementById('profileBtnNormal'),
    };

    const appState = {
      currentUser: null,
      users: new Map(),
      admins: new Set(),
      bans: new Set(),
      messages: new Map(),
      latestMessageTime: 0,
      isLoadingMore: false,
      hasMoreOldMessages: true,
      oldestMessageTime: 0,
      isInitialising: true,
      mentionHistory: JSON.parse(localStorage.getItem('mentionHistory') || '[]'),
      mentionIndex: 0,
      mentionItems: [],
      selectMode: false,
      selectedMessages: new Set(),
      profileDirty: false,
      pendingAvatarBlob: null,
      statuses: new Map(),
      isDeletingAccount: false,
      unreadCount: 0,
      isOffline: false,
    };

    function saveMentionHistory(nickname) {
      if (nickname === 'everyone') return;
      let history = appState.mentionHistory.filter(n => n !== nickname);
      history.unshift(nickname);
      appState.mentionHistory = history.slice(0, 10);
      localStorage.setItem('mentionHistory', JSON.stringify(appState.mentionHistory));
    }

    function showModal({ title, content, confirmText = '確定', cancelText = '取消', showCancel = false }) {
      return new Promise((resolve) => {
        elements.customModal.innerHTML = `
          <div class="modal-content">
            <div class="modal-title">${title}</div>
            <div class="modal-body">${content}</div>
            <div class="modal-actions">
              <button class="confirm">${confirmText}</button>
              ${showCancel ? `<button class="cancel">${cancelText}</button>` : ''}
            </div>
          </div>`;
        elements.modalOverlay.classList.remove('hidden');
        elements.customModal.classList.remove('hidden');
        const confirmBtn = elements.customModal.querySelector('.confirm');
        const cancelBtn = elements.customModal.querySelector('.cancel');
        confirmBtn.onclick = () => {
          const skipCheckbox = elements.customModal.querySelector('#linkConfirmSkip');
          if (skipCheckbox && skipCheckbox.checked) {
            localStorage.setItem('linkConfirmSkip', 'true');
          }
          elements.modalOverlay.classList.add('hidden');
          elements.customModal.classList.add('hidden');
          resolve(true);
        };
        if (cancelBtn) {
          cancelBtn.onclick = () => {
            elements.modalOverlay.classList.add('hidden');
            elements.customModal.classList.add('hidden');
            resolve(false);
          };
        }
      });
    }

    let isAppInitialized = false;
    let myConnectionRef = null;
    onAuthStateChanged(auth, (user) => {
      if (!user) return window.location.href = 'login.html';
      if (isAppInitialized) return;
      isAppInitialized = true;
      appState.currentUser = user;
      initializeApp();
      reload(user).catch(() => {});
    });

    async function initializeApp() {
      try {
        const cachedMsgs = localStorage.getItem('cachedMessages');
        if (cachedMsgs) {
          appState.messages = new Map(JSON.parse(cachedMsgs));
        }
        const cachedUsers = localStorage.getItem('cachedUsers');
        if (cachedUsers) {
          appState.users = new Map(JSON.parse(cachedUsers));
        }
        if (appState.messages.size > 0) {
          renderAllMessages(true, true);
        }
      } catch (e) {}

      try {
        const [usersSnap, adminsSnap, bansSnap] = await Promise.all([
          get(ref(db, 'users')),
          get(ref(db, 'admins')),
          get(ref(db, 'bans')),
        ]);

        appState.users.clear();
        usersSnap.forEach(u => {
          const p = u.val()?.profile;
          if (p) appState.users.set(u.key, { uid: u.key, ...p });
        });
        saveUsersToLocalCache();

        adminsSnap.forEach(ch => { if (ch.val() === true) appState.admins.add(ch.key); });
        bansSnap.forEach(ch => { if (ch.val() === true) appState.bans.add(ch.key); });

        await loadInitialMessages();
        if (appState.currentUser && !appState.users.has(appState.currentUser.uid)) {
          await signOut(auth);
          return;
        }
        appState.isOffline = false;
        const hasCache = appState.messages.size > 0;
        updateAndRenderUI(!hasCache);
        attachRealtimeListeners();
        setupEventListeners();
        setupPresence(appState.currentUser.uid);
        setupGifObserver();

      } catch (error) {
        appState.isOffline = true;
        const hasCache = appState.messages.size > 0;
        updateAndRenderUI(!hasCache);
        window.addEventListener('online', () => {
          location.reload();
        });
      }
    }

    function attachRealtimeListeners() {
      onValue(ref(db, 'users'), (snap) => {
        appState.users.clear();
        snap.forEach(u => {
          const p = u.val()?.profile;
          if (p) appState.users.set(u.key, { uid: u.key, ...p });
        });
        saveUsersToLocalCache();
        if (!appState.isDeletingAccount && !appState.isInitialising && appState.currentUser && !appState.users.has(appState.currentUser.uid)) {
          signOut(auth);
          return;
        }
        updateAndRenderUI();
      });

      onValue(ref(db, 'admins'), (snap) => {
        appState.admins.clear();
        snap.forEach(ch => { if (ch.val() === true) appState.admins.add(ch.key); });
        updateAndRenderUI();
      });

      onValue(ref(db, 'bans'), (snap) => {
        appState.bans.clear();
        snap.forEach(ch => { if (ch.val() === true) appState.bans.add(ch.key); });
        updateAndRenderUI();
      });

      onValue(ref(db, 'status'), (snap) => {
        appState.statuses.clear();
        snap.forEach(s => {
          appState.statuses.set(s.key, s.val());
        });
        updateAndRenderUI();
      });

      const messagesRef = ref(db, 'messages');
      const newMessagesQuery = query(messagesRef, orderByChild('time'), startAt(appState.latestMessageTime));
      onChildAdded(newMessagesQuery, (snap) => {
        if (appState.messages.has(snap.key)) return;
        const msg = snap.val();
        appState.messages.set(snap.key, msg);
        appState.latestMessageTime = msg.time;
        const isAtBottom = elements.messagesBox.scrollHeight - elements.messagesBox.scrollTop - elements.messagesBox.clientHeight < 100;
        const el = createMessageElement(snap.key, msg);
        elements.messagesBox.appendChild(el);
        observeNewGifs(elements.messagesBox);
        if (msg.uid === appState.currentUser.uid || isAtBottom || appState.isInitialising) {
          scrollToBottomAfterImages(elements.messagesBox, !appState.isInitialising);
          hideUnreadBanner();
        } else {
          showUnreadBanner();
        }
        triggerNotification(msg);
      });

      onChildRemoved(messagesRef, (snap) => {
        if (appState.messages.has(snap.key)) {
          appState.messages.delete(snap.key);
          const msgElement = elements.messagesBox.querySelector(`[data-msg-id="${snap.key}"]`);
          if (msgElement) msgElement.remove();
          saveMessagesToLocalCache();
        }
      });
    }

    function updateAndRenderUI(isInitial = false) {
      renderControls();
      renderUserList();
      renderAllMessages(isInitial);
    }

    const DEFAULT_AVATAR_SVG = '<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';

    const AVATAR_OVERLAY_HTML = '<div class="avatar-overlay"><svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg><span>更改頭像</span></div>';

    function avatarHtml(user, className = 'avatar', defaultClass = 'avatar-default', withOverlay = false, showStatus = true) {
      const overlay = withOverlay ? AVATAR_OVERLAY_HTML : '';
      const uid = user?.uid || (className.startsWith('profile') ? appState.currentUser?.uid : null);
      let statusDotHtml = '';
      if (showStatus && uid) {
        const s = appState.statuses.get(uid);
        const myProfile = appState.users.get(uid);
        const currentMode = myProfile?.statusMode || s?.mode || 'online';
        const hasConnections = s?.connections && Object.keys(s.connections).length > 0;
        const isOnline = (uid === appState.currentUser?.uid)
          ? (currentMode !== 'invisible')
          : (hasConnections && currentMode !== 'invisible');
        if (isOnline) {
          statusDotHtml = `<span class="status-dot ${currentMode === 'dnd' ? 'dnd' : 'online'}"></span>`;
        } else {
          statusDotHtml = `<span class="status-dot invisible"></span>`;
        }
      }
      const imgHtml = (user && user.avatarUrl)
        ? `<img class="${className}" src="${user.avatarUrl}" alt="">`
        : `<div class="${defaultClass}">${DEFAULT_AVATAR_SVG}</div>`;
      const containerClass = className ? `${className}-container` : '';
      return `<div class="avatar-container ${containerClass}">${imgHtml}${overlay}${statusDotHtml}</div>`;
    }

    function renderControls() {
      const { currentUser, admins, bans, users, isOffline } = appState;
      const myProfile = users.get(currentUser.uid);
      const isVerified = !!currentUser.emailVerified;
      const isBanned = bans.has(currentUser.uid);
      const hasNick = myProfile && myProfile.nickname;
      const isAdmin = admins.has(currentUser.uid);

      elements.verifyBanner.classList.toggle('hidden', isVerified);
      elements.banBanner.classList.toggle('hidden', !isBanned);
      if (elements.notificationBanner) {
        const isDismissed = localStorage.getItem('dismissNotificationBanner') === 'true';
        const showNotifBanner = isVerified && !isBanned && ('Notification' in window) && (Notification.permission === 'default') && !isDismissed;
        elements.notificationBanner.classList.toggle('hidden', !showNotifBanner);
      }
      elements.adminPanel.classList.toggle('hidden', !isAdmin);
      elements.sidebarProfile.classList.toggle('hidden', isAdmin);

      const isDisabled = !isVerified || isBanned || !hasNick || isOffline;
      elements.inputEl.contentEditable = !isDisabled;
      elements.sendBtn.disabled = isDisabled;
      document.getElementById('emojiBtn').disabled = isDisabled;
      const placeholder = isDisabled
        ? (isOffline ? '網路連線中斷，目前處於離線模式' : (isBanned ? '您已被管理員封鎖' : (!isVerified ? '請先驗證 Email' : '請先設定暱稱')))
        : '輸入訊息...';
      elements.inputEl.setAttribute('data-placeholder', placeholder);

      if (myProfile) elements.newNickEl.value = myProfile.nickname || '';

      const profileInner = `${avatarHtml(myProfile, 'profile-avatar', 'profile-avatar-default')}<span class="profile-nick">${myProfile?.nickname || '未命名'}</span>`;
      elements.profileBtnAdmin.innerHTML = profileInner;
      elements.profileBtnNormal.innerHTML = profileInner;
    }

    function renderUserList() {
      const { currentUser, users, admins, bans } = appState;
      const userArray = Array.from(users.values());
      userArray.sort((a, b) => (a.nickname || '').localeCompare(b.nickname || '', 'zh-Hant'));

      const html = userArray.map(u => {
        const isMe = currentUser.uid === u.uid;
        const isAdmin = admins.has(u.uid);
        const isBanned = bans.has(u.uid);
        const classes = ['userrow', isMe && 'me', isAdmin && 'admin', isBanned && 'banned'].filter(Boolean).join(' ');
        const adminTag = isAdmin ? ' <span class="tag-admin">[管理員]</span>' : '';
        return `<div class="${classes}" data-uid="${u.uid}">${avatarHtml(u)}<span>${u.nickname || '未命名'}${adminTag}</span></div>`;
      }).join('');

      elements.userListContainer.innerHTML = `<div class="userlist">${html}</div>`;
    }

    function scrollToBottomAfterImages(container, smooth = false) {
      if (!container) return;

      const performScroll = () => {
        const target = container.scrollHeight;
        container.style.scrollBehavior = 'auto';
        container.scrollTo({ top: target, behavior: smooth ? 'smooth' : 'instant' });
        container.style.scrollBehavior = '';
      };
      
      performScroll();

      if (!container._resizeObserver) {
        container._resizeObserver = new ResizeObserver(() => {
           const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
           if (appState.isInitialising || isAtBottom) {
             container.style.scrollBehavior = 'auto';
             container.scrollTo({ top: container.scrollHeight, behavior: 'instant' });
             container.style.scrollBehavior = '';
           }
        });
        
        const observeChildren = () => {
            Array.from(container.children).forEach(child => {
                if (!child._isObserved) {
                    child._isObserved = true;
                    container._resizeObserver.observe(child);
                }
            });
        };
        
        observeChildren();
        container._resizeObserver.observe(container);
        
        container._mutationObserver = new MutationObserver(() => {
            observeChildren();
        });
        container._mutationObserver.observe(container, { childList: true });
      } else {
        const images = container.querySelectorAll('img:not([data-observed])');
        images.forEach(img => {
          img.dataset.observed = 'true';
          img.addEventListener('load', () => {
             const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 100;
             if (appState.isInitialising || isAtBottom) {
                 performScroll();
             }
          }, { once: true });
        });
      }
    }

    let gifObserver = null;
    function setupGifObserver() {
      if (gifObserver) return;
      gifObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const img = entry.target.querySelector('img[data-src]');
          if (!img) return;
          if (entry.isIntersecting) {
            if (!img.src || img.src === location.href) {
              img.src = img.dataset.src;
            }
          } else {
            if (img.src && img.src !== location.href) {
              img.src = '';
              img.style.opacity = '0';
              const spinner = img.previousElementSibling;
              if (spinner) spinner.style.display = '';
            }
          }
        });
      }, { root: elements.messagesBox, rootMargin: '800px 0px' });
      elements.messagesBox.querySelectorAll('.chat-gif').forEach(el => gifObserver.observe(el));
    }

    function observeNewGifs(container) {
      if (!gifObserver) return;
      container.querySelectorAll('.chat-gif').forEach(el => {
        if (!el._gifObserved) {
          el._gifObserved = true;
          gifObserver.observe(el);
        }
      });
    }

    function showUnreadBanner() {
      appState.unreadCount++;
      const textEl = document.getElementById('unreadCountText');
      if (textEl) {
        textEl.textContent = `有 ${appState.unreadCount} 則新訊息`;
      }
      const banner = document.getElementById('unreadBanner');
      if (banner) {
        banner.classList.remove('hidden');
      }
    }

    function hideUnreadBanner() {
      appState.unreadCount = 0;
      const banner = document.getElementById('unreadBanner');
      if (banner) {
        banner.classList.add('hidden');
      }
    }

    function saveMessagesToLocalCache() {
      try {
        const msgsArray = Array.from(appState.messages.entries());
        localStorage.setItem('cachedMessages', JSON.stringify(msgsArray));
      } catch (e) {}
    }

    function saveUsersToLocalCache() {
      try {
        const usersArray = Array.from(appState.users.entries());
        localStorage.setItem('cachedUsers', JSON.stringify(usersArray));
      } catch (e) {}
    }

    function renderAllMessages(isInitial = false, fastHide = false) {
      const sortedMessages = Array.from(appState.messages.entries()).sort((a, b) => a[1].time - b[1].time);
      elements.messagesBox.innerHTML = sortedMessages.map(([key, msg]) => createMessageElement(key, msg).outerHTML).join('');
      observeNewGifs(elements.messagesBox);
      saveMessagesToLocalCache();

      if (isInitial) {
        scrollToBottomAfterImages(elements.messagesBox, false);
        if (appState.initTimer) clearTimeout(appState.initTimer);
        const delay = fastHide ? 100 : 800;
        appState.initTimer = setTimeout(() => {
          appState.isInitialising = false;
          const loader = document.getElementById('chatLoadingPlaceholder');
          if (loader) {
            loader.classList.add('hidden');
          }
          scrollToBottomAfterImages(elements.messagesBox, false);
        }, delay);
      }
    }

    async function loadInitialMessages() {
      const msgQuery = query(ref(db, 'messages'), orderByChild('time'), limitToLast(30));
      const initialSnap = await get(msgQuery);

      if (initialSnap.exists()) {
        let maxTime = 0;
        let minTime = Infinity;
        let messageCount = 0;
        initialSnap.forEach(snap => {
          const msg = snap.val();
          appState.messages.set(snap.key, msg);
          if (msg.time > maxTime) maxTime = msg.time;
          if (msg.time < minTime) minTime = msg.time;
          messageCount++;
        });
        appState.latestMessageTime = maxTime;
        appState.oldestMessageTime = minTime;
        appState.hasMoreOldMessages = initialSnap.size === 30;
      } else {
        appState.hasMoreOldMessages = false;
      }
    }

    async function loadMoreMessages() {
      if (appState.isLoadingMore || !appState.hasMoreOldMessages) return;
      appState.isLoadingMore = true;

      try {
        const msgQuery = query(ref(db, 'messages'), orderByChild('time'), endBefore(appState.oldestMessageTime), limitToLast(30));
        const snap = await get(msgQuery);

        if (snap.exists()) {
          const oldScrollHeight = elements.messagesBox.scrollHeight;
          const oldScrollTop = elements.messagesBox.scrollTop;
          const newMessages = [];
          let minTime = appState.oldestMessageTime;
          let messageCount = 0;

          snap.forEach(s => {
            const msg = s.val();
            if (!appState.messages.has(s.key)) {
              newMessages.push({ key: s.key, msg });
              if (msg.time < minTime) minTime = msg.time;
              messageCount++;
            }
          });
          newMessages.sort((a, b) => a.msg.time - b.msg.time);
          const fragment = document.createDocumentFragment();
          newMessages.forEach(item => {
            appState.messages.set(item.key, item.msg);
            const el = createMessageElement(item.key, item.msg);
            fragment.appendChild(el);
          });
          elements.messagesBox.insertBefore(fragment, elements.messagesBox.firstChild);
          observeNewGifs(elements.messagesBox);
          appState.oldestMessageTime = minTime;
          appState.hasMoreOldMessages = snap.size === 30;
          const newScrollHeight = elements.messagesBox.scrollHeight;
          elements.messagesBox.style.scrollBehavior = 'auto';
          elements.messagesBox.scrollTop = oldScrollTop + (newScrollHeight - oldScrollHeight);
          elements.messagesBox.style.scrollBehavior = '';

          if (appState.selectMode) {
            elements.messagesBox.querySelectorAll('.chat-message').forEach(el => {
              if (el.classList.contains('select-mode')) return;
              const key = el.dataset.msgId;
              const msg = appState.messages.get(key);
              if (!msg) return;
              const canSelect = msg.uid === appState.currentUser.uid || appState.admins.has(appState.currentUser.uid);
              if (!canSelect) return;
              el.classList.add('select-mode');
              const cb = document.createElement('div');
              cb.className = 'select-checkbox' + (appState.selectedMessages.has(key) ? ' checked' : '');
              cb.dataset.msgKey = key;
              el.insertBefore(cb, el.firstChild);
            });
          }
        } else {
          appState.hasMoreOldMessages = false;
        }
      } catch (e) {
      } finally {
        appState.isLoadingMore = false;
      }
    }


    function createMessageElement(key, msg) {
      const { currentUser, admins, users } = appState;
      const isSelf = currentUser.uid === msg.uid;
      const isAdmin = admins.has(currentUser.uid);
      const canDelete = isSelf || isAdmin;
      const wrap = document.createElement('div');
      wrap.className = `chat-message ${isSelf ? 'self' : 'other'}`;
      wrap.dataset.msgId = key;
      const deleteBtnHtml = canDelete ? `<button class="del-btn" data-key="${key}">刪除</button>` : '';
      const authorUser = users.get(msg.uid) || { uid: msg.uid, nickname: msg.nickname };
      const authorName = authorUser?.nickname || msg.nickname || '...';
      const bubbleAvatarHtml = avatarHtml(authorUser, 'bubble-avatar', 'bubble-avatar-default', false, false);
      wrap.innerHTML = `
        <div class="bubble">
            <div class="bubble-head">
                ${bubbleAvatarHtml}
                <div class="bubble-name" data-uid="${msg.uid}">${authorName}</div>
                ${deleteBtnHtml}
            </div>
            ${msg.type === 'gif' 
              ? `<div class="chat-gif" style="position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;${msg.width && msg.height ? `aspect-ratio:${msg.width}/${msg.height};width:${msg.width}px;max-width:100%;height:auto;` : `aspect-ratio:1/1;min-height:200px;max-height:250px;max-width:100%;width:auto;`}">
                   <div class="chat-loading-spinner" style="position:absolute;z-index:0;"></div>
                   <img data-src="${msg.url || ''}" style="width:100%;height:100%;object-fit:cover;position:relative;z-index:1;opacity:0;transition:opacity 0.2s;" alt="GIF" onload="this.style.opacity='1';if(this.previousElementSibling)this.previousElementSibling.style.display='none';">
                 </div>`
              : `<div class="bubble-text">${renderWithMentions(msg.text)}</div>`}
            <div class="bubble-time">${fmt(new Date(msg.time))}</div>
        </div>`;
      return wrap;
    }

    window.sendGifMessage = async function(url, width, height) {
      const myProfile = appState.users.get(appState.currentUser.uid);
      try {
        await push(ref(db, 'messages'), {
          uid: appState.currentUser.uid, type: 'gif', url, text: '[GIF 貼圖]', time: Date.now(), nickname: myProfile.nickname,
          width: width || 0, height: height || 0
        });
      } catch (e) {
        showModal({ title: '錯誤', content: '發送 GIF 失敗：' + e.message });
      }
    };

    async function sendMessage() {
      const text = elements.inputEl.innerText.trim();
      if (!text) return;
      if (text.length > 2000) {
        showModal({ title: '提示', content: `訊息超出字數限制（${text.length} / 2000 字），請縮短後再傳送。` });
        return;
      }
      const myProfile = appState.users.get(appState.currentUser.uid);
      try {
        const mentionRegex = /@([\p{L}\p{N}_-]{3,24})/gu;
        let match;
        while ((match = mentionRegex.exec(text)) !== null) {
          saveMentionHistory(match[1]);
        }
        await push(ref(db, 'messages'), {
          uid: appState.currentUser.uid, text, time: Date.now(), nickname: myProfile.nickname,
        });
        elements.inputEl.innerHTML = '';
        hideMentionList();
        document.getElementById('emojiPanel').classList.add('hidden');
      } catch { showModal({ title: '錯誤', content: '訊息傳送失敗。' }); }
      elements.inputEl.focus();
    }

    function setupEventListeners() {
      const isMobileDevice = window.matchMedia('(pointer: coarse)').matches && window.innerWidth <= 768;
      elements.sendBtn.addEventListener('mousedown', (e) => e.preventDefault());
      elements.sendBtn.addEventListener('click', () => sendMessage());
      elements.sendBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        sendMessage();
      });

      elements.inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !isMobileDevice) {
          e.preventDefault();
          if (appState.mentionIndex >= 0 && !elements.mentionList.classList.contains('hidden')) {
            insertMention(appState.mentionItems[appState.mentionIndex].nickname);
          } else {
            sendMessage();
          }
        } else if (e.key === 'Enter' && isMobileDevice && !elements.mentionList.classList.contains('hidden')) {
          e.preventDefault();
          insertMention(appState.mentionItems[appState.mentionIndex].nickname);
        } else if (e.key === 'ArrowUp' && !elements.mentionList.classList.contains('hidden')) {
          e.preventDefault();
          appState.mentionIndex = (appState.mentionIndex - 1 + appState.mentionItems.length) % appState.mentionItems.length;
          renderMentionHighlight();
        } else if (e.key === 'ArrowDown' && !elements.mentionList.classList.contains('hidden')) {
          e.preventDefault();
          appState.mentionIndex = (appState.mentionIndex + 1) % appState.mentionItems.length;
          renderMentionHighlight();
        }
      });

      elements.inputEl.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
      });
      elements.inputEl.oninput = handleInput;
      elements.logoutBtn.onclick = async () => {
        const ok = await showModal({ title: '確認', content: '確定要登出嗎？', showCancel: true });

            try {
              await remove(myConnectionRef);
            } catch (e) {}
          }
          signOut(auth);
        }
      };
      elements.saveNickBtn.onclick = changeNickname;
      elements.brandBtn.onclick = () => location.reload();
      elements.manageBtn.onclick = () => window.location.href = 'admin.html';
      elements.profileBtnAdmin.onclick = () => openProfileModal();
      elements.profileBtnNormal.onclick = () => openProfileModal();

      elements.resendVerify.onclick = async () => {
        try {
          await sendEmailVerification(appState.currentUser);
          showModal({ title: '通知', content: '已重新寄出驗證信。' });
        } catch {
          showModal({ title: '錯誤', content: '寄送太頻繁，請稍後再試。' });
        }
      };
      if (elements.enableNotificationsBtn) {
        elements.enableNotificationsBtn.onclick = async () => {
          try {
            const permission = await Notification.requestPermission();

              showModal({ title: '通知設定', content: '已成功開啟通知功能！' });

          } catch (e) {

      }

      if (closeNotifBtn) {
        closeNotifBtn.onclick = () => {
          localStorage.setItem('dismissNotificationBanner', 'true');
          updateAndRenderUI();
        };
      }
      elements.userListContainer.addEventListener('click', e => {
        const target = e.target.closest('.userrow');
        if (target) openUserCard(target.dataset.uid);
      });

      elements.selectDeleteBtn.onclick = async () => {
        const count = appState.selectedMessages.size;
        if (count === 0) return;
        const ok = await showModal({ title: '確認', content: `確定要刪除選取的 ${count} 條訊息？`, showCancel: true });
        if (!ok) return;
        try {
          const deletes = Array.from(appState.selectedMessages).map(key => remove(ref(db, `messages/${key}`)));
          await Promise.all(deletes);
          exitSelectMode();
        } catch { showModal({ title: '錯誤', content: '批次刪除失敗' }); }
      };
      elements.selectCancelBtn.onclick = () => exitSelectMode();

      let longPressTimer = null;
      let longPressFired = false;
      elements.messagesBox.addEventListener('pointerdown', e => {
        if (appState.selectMode) return;
        const bubble = e.target.closest('.bubble');
        if (!bubble) return;
        const msgEl = bubble.closest('.chat-message');
        if (!msgEl) return;
        const key = msgEl.dataset.msgId;
        const msg = appState.messages.get(key);
        if (!msg) return;
        const canSelect = msg.uid === appState.currentUser.uid || appState.admins.has(appState.currentUser.uid);
        if (!canSelect) return;
        longPressFired = false;
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          longPressFired = true;
          enterSelectMode(key);
        }, 600);
      });
      elements.messagesBox.addEventListener('pointermove', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
      elements.messagesBox.addEventListener('pointerup', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
      elements.messagesBox.addEventListener('contextmenu', e => { if (longPressFired) e.preventDefault(); });

      elements.messagesBox.addEventListener('click', async (e) => {
        if (longPressFired) { longPressFired = false; return; }
        if (appState.selectMode) {
          const cb = e.target.closest('.select-checkbox');
          if (cb) { toggleSelect(cb.dataset.msgKey); return; }
          const bubble = e.target.closest('.bubble');
          if (bubble) {
            const msgEl = bubble.closest('.chat-message');
            if (msgEl && msgEl.querySelector('.select-checkbox')) {
              toggleSelect(msgEl.dataset.msgId);
            }
          }
          return;
        }
        if (e.target.classList.contains('del-btn')) {
          const key = e.target.dataset.key;
          const ok = await showModal({ title: '確認', content: '確定要刪除此訊息？', showCancel: true });
          if (ok) {
            remove(ref(db, `messages/${key}`)).catch(() => showModal({ title: '錯誤', content: '刪除失敗' }));
          }
        }
        if (e.target.classList.contains('bubble-name') || e.target.classList.contains('mention')) {
          const uid = e.target.dataset.uid;
          if (uid) openUserCard(uid);
          else if (e.target.innerText.includes('everyone')) return;
          else {
            const name = e.target.innerText.replace('@', '');
            const user = Array.from(appState.users.values()).find(u => u.nickname === name);
            if (user) openUserCard(user.uid);
          }
        }
        const link = e.target.closest('.chat-link');
        if (link) {
          const skipAsk = localStorage.getItem('skipLinkAsk') === 'true';
          if (skipAsk) return; // Allow the default <a> tag behavior

          e.preventDefault();
          const url = link.dataset.url;
          const content = `
            <div style="margin-bottom:12px;">你即將前往：<br><a href="${url}" target="_blank" style="color:var(--brand);word-break:break-all;">${url}</a></div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;">
              <input type="checkbox" id="skipLinkAskCheck">
              <span>不再詢問，之後直接前往</span>
            </label>
          `;
          const ok = await showModal({ title: '⚠️ 前往外部連結', content, showCancel: true, confirmText: '前往' });
          if (ok) {
            const cb = document.getElementById('skipLinkAskCheck');
            if (cb && cb.checked) localStorage.setItem('skipLinkAsk', 'true');
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          }
        }
      });
      elements.messagesBox.addEventListener('scroll', () => {
        if (elements.messagesBox.scrollTop < 50 && !appState.isLoadingMore && !appState.isInitialising) {
          loadMoreMessages();
        }
        const isAtBottom = elements.messagesBox.scrollHeight - elements.messagesBox.scrollTop - elements.messagesBox.clientHeight < 100;
        if (isAtBottom && appState.unreadCount > 0) {
          hideUnreadBanner();
        }
      });
      const unreadBanner = document.getElementById('unreadBanner');
      if (unreadBanner) {
        unreadBanner.onclick = () => {
          scrollToBottomAfterImages(elements.messagesBox, true);
          hideUnreadBanner();
        };
      }
    }

    function handleInput() {
      highlightInputMentions();
      const text = elements.inputEl.innerText;
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const textBeforeCursor = text.substring(0, selection.focusOffset);
      const lastAtIdx = textBeforeCursor.lastIndexOf('@');

      if (lastAtIdx !== -1) {
        const queryStr = textBeforeCursor.substring(lastAtIdx + 1);
        if (!queryStr.includes(' ')) {
          showMentionList(queryStr);
          return;
        }
      }
      hideMentionList();
    }

    function highlightInputMentions() {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const text = elements.inputEl.innerText;
      const highlighted = text.replace(/@([\p{L}\p{N}_-]{3,24})/gu, '<span class="mention-in-input">@$1</span>');
    }

    function showMentionList(queryStr) {
      const allUsers = Array.from(appState.users.values());
      let filtered = [];

      if (queryStr === '') {
        filtered.push({ nickname: 'everyone', isEveryone: true });
        const historyNames = appState.mentionHistory;
        const fromHistory = allUsers.filter(u => historyNames.includes(u.nickname)).slice(0, 3);
        filtered.push(...fromHistory);
        if (filtered.length < 4) {
          const others = allUsers.filter(u => !historyNames.includes(u.nickname));
          const random = others.sort(() => 0.5 - Math.random()).slice(0, 4 - filtered.length);
          filtered.push(...random);
        }
      } else {
        const lower = queryStr.toLowerCase();
        filtered = allUsers
          .filter(u => u.nickname && u.nickname.toLowerCase().startsWith(lower))
          .sort((a, b) => a.nickname.localeCompare(b.nickname))
          .slice(0, 3);
        if ('everyone'.startsWith(lower)) filtered.unshift({ nickname: 'everyone', isEveryone: true });
      }

      if (filtered.length === 0) return hideMentionList();

      appState.mentionItems = filtered;
      appState.mentionIndex = 0;
      renderMentionItems();
      elements.mentionList.classList.remove('hidden');
    }

    function renderMentionItems() {
      elements.mentionList.innerHTML = appState.mentionItems.map((u, i) => `
        <div class="mention-item ${u.isEveryone ? 'everyone' : ''} ${i === appState.mentionIndex ? 'active' : ''}" data-index="${i}">
          <span class="name">@${u.nickname}</span>
        </div>
      `).join('');

      elements.mentionList.querySelectorAll('.mention-item').forEach(item => {
        item.onclick = () => {
          const idx = parseInt(item.dataset.index);
          insertMention(appState.mentionItems[idx].nickname);
        };
      });
    }

    function renderMentionHighlight() {
      const items = elements.mentionList.querySelectorAll('.mention-item');
      items.forEach((item, i) => {
        item.classList.toggle('active', i === appState.mentionIndex);
      });
    }

    function insertMention(nickname) {
      const text = elements.inputEl.innerText;
      const selection = window.getSelection();
      const offset = selection.focusOffset;
      const textBeforeCursor = text.substring(0, offset);
      const lastAtIdx = textBeforeCursor.lastIndexOf('@');
      const textAfterCursor = text.substring(offset);

      const newText = textBeforeCursor.substring(0, lastAtIdx) + '@' + nickname + ' ' + textAfterCursor;
      elements.inputEl.innerText = newText;
      hideMentionList();
      elements.inputEl.focus();

      const newPos = lastAtIdx + nickname.length + 2;
      const range = document.createRange();
      const sel = window.getSelection();
      if (elements.inputEl.childNodes.length > 0) {
        range.setStart(elements.inputEl.childNodes[0], newPos);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }

    function hideMentionList() {
      elements.mentionList.classList.add('hidden');
      appState.mentionItems = [];
      appState.mentionIndex = 0;
    }

    async function changeNickname() {
      const newNick = elements.newNickEl.value.trim();
      if (newNick.length < 3 || newNick.length > 24) return showModal({ title: '提示', content: '暱稱需 3–24 字' });
      const uid = appState.currentUser.uid;
      const myProfile = appState.users.get(uid);
      const lower = newNick.toLowerCase();
      const oldLower = myProfile?.nicknameLower || '';
      if (lower === oldLower) return;
      try {
        const res = await runTransaction(ref(db, `nicknames/${lower}`), (cur) => (cur === null || cur === uid) ? uid : undefined);
        if (!res.committed) return showModal({ title: '提示', content: '暱稱已被使用，請換一個' });
        await update(ref(db, `users/${uid}/profile`), { nickname: newNick, nicknameLower: lower });
        if (oldLower) await set(ref(db, `nicknames/${oldLower}`), null);
        showModal({ title: '完成', content: '已更新暱稱' });
      } catch (e) { showModal({ title: '錯誤', content: '更新失敗，請稍後再試' }); }
    }

    function openUserCard(uid) {
      const { currentUser, users, admins, bans } = appState;
      const targetUser = users.get(uid);
      if (!targetUser) return;
      const isMe = currentUser.uid === uid;
      const isCurrentUserAdmin = admins.has(currentUser.uid);
      const canManage = isCurrentUserAdmin && !isMe;
      const isTargetBanned = bans.has(uid);
      const isTargetAdmin = admins.has(uid);
      let adminButtonHtml = '';
      if (canManage) {
        adminButtonHtml = `<button id="promoteBtn" class="${isTargetAdmin ? 'danger' : 'promote'}">${isTargetAdmin ? '移除管理員' : '設為管理員'}</button>`;
      }
      const banButtonHtml = canManage
        ? `<button id="banBtn" class="${isTargetBanned ? '' : 'danger'}">${isTargetBanned ? '解封鎖' : '封鎖此用戶'}</button>`
        : '';
      elements.userCard.innerHTML = `
        <div class="user-card">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            ${avatarHtml(targetUser, 'card-avatar', 'card-avatar-default')}
            <div>
              <div class="card-name">${targetUser.nickname} ${isTargetAdmin ? '<span class="tag-admin">[管理員]</span>' : ''}</div>
              <div class="card-registered">註冊時間：${fmt(targetUser.registeredAt)}</div>
            </div>
          </div>
          <div class="card-actions">
            ${adminButtonHtml}
            ${banButtonHtml}
            <button id="closeCard">關閉</button>
          </div>
        </div>`;
      elements.userCard.classList.remove('hidden');
      document.getElementById('closeCard').onclick = () => elements.userCard.classList.add('hidden');
      const banBtn = document.getElementById('banBtn');
      if (banBtn) {
        banBtn.onclick = async () => {
          const ok = await showModal({ title: '確認', content: isTargetBanned ? '確定要解封？' : '確定封鎖此用戶？', showCancel: true });
          if (!ok) return;
          try {
            await (isTargetBanned ? remove(ref(db, `bans/${uid}`)) : set(ref(db, `bans/${uid}`), true));
            elements.userCard.classList.add('hidden');
          } catch { showModal({ title: '錯誤', content: '操作失敗' }); }
        };
      }
      const promoteBtn = document.getElementById('promoteBtn');
      if (promoteBtn) {
        promoteBtn.onclick = async () => {
          const actionText = isTargetAdmin ? '移除其管理員權限' : '將其設為管理員';
          const ok = await showModal({ title: '確認', content: `確定要${actionText}？`, showCancel: true });
          if (!ok) return;
          try {
            await (isTargetAdmin ? remove(ref(db, `admins/${uid}`)) : set(ref(db, `admins/${uid}`), true));
            elements.userCard.classList.add('hidden');
          } catch { showModal({ title: '錯誤', content: '操作失敗' }); }
        };
      }
    }

    async function adminDeleteUser(uid, nickname) {
      const ok = await showModal({
        title: '⚠️ 刪除帳號',
        content: `<span style="color:#e02e2e;font-weight:700;">確定要刪除 ${nickname} 的帳號嗎？</span><br>此操作無法復原，該用戶的所有訊息和頭像都將被刪除。`,
        showCancel: true,
        confirmText: '確認刪除'
      });
      if (!ok) return;
      try {
        const profile = appState.users.get(uid);
        if (profile?.nicknameLower) await set(ref(db, `nicknames/${profile.nicknameLower}`), null);
        await remove(ref(db, `users/${uid}`));
        if (appState.admins.has(uid)) await remove(ref(db, `admins/${uid}`));
        if (appState.bans.has(uid)) await remove(ref(db, `bans/${uid}`));
        await remove(ref(db, `status/${uid}`));
        const msgsSnap = await get(query(ref(db, 'messages'), orderByChild('uid')));
        const deletes = [];
        msgsSnap.forEach(s => { if (s.val().uid === uid) deletes.push(remove(ref(db, `messages/${s.key}`))); });
        await Promise.all(deletes);
        try { await deleteObject(storageRef(storage, `avatars/${uid}`)); } catch { }
        elements.userCard.classList.add('hidden');
        showModal({ title: '完成', content: `已刪除 ${nickname} 的帳號` });
      } catch { showModal({ title: '錯誤', content: '刪除失敗' }); }
    }

    function openProfileModal() {
      const { currentUser, users, bans } = appState;
      const myProfile = users.get(currentUser.uid);
      const isBanned = bans.has(currentUser.uid);

    function openCropModal(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let scale = 1;
          let offsetX = 0, offsetY = 0;
          const containerSize = 280;
          const minDim = Math.min(img.width, img.height);
          const baseScale = containerSize / minDim;
          scale = baseScale;
          let imgW = img.width * scale;
          let imgH = img.height * scale;
          offsetX = (containerSize - imgW) / 2;
          offsetY = (containerSize - imgH) / 2;

          elements.cropModal.innerHTML = `
            <div class="crop-container">
              <img id="cropImage" src="${e.target.result}" style="width:${imgW}px;height:${imgH}px;left:${offsetX}px;top:${offsetY}px;">
              <div class="crop-overlay"></div>
            </div>
            <div class="crop-controls">
              <span>縮小</span>
              <input type="range" id="cropZoom" min="50" max="300" value="100">
              <span>放大</span>
            </div>
            <div class="crop-actions">
              <button id="cropConfirm">確認</button>
              <button id="cropCancel" style="background:var(--brand2);">關閉</button>
            </div>`;
          elements.cropModal.classList.remove('hidden');

          const cropImg = document.getElementById('cropImage');
          const zoomInput = document.getElementById('cropZoom');
          let isDragging = false, startX, startY;

          function updateImg() {
            cropImg.style.width = imgW + 'px';
            cropImg.style.height = imgH + 'px';
            cropImg.style.left = offsetX + 'px';
            cropImg.style.top = offsetY + 'px';
          }

          zoomInput.oninput = () => {
            const zoom = parseInt(zoomInput.value) / 100;
            const newW = img.width * baseScale * zoom;
            const newH = img.height * baseScale * zoom;
            const cx = containerSize / 2;
            const cy = containerSize / 2;
            offsetX = cx - (cx - offsetX) * (newW / imgW);
            offsetY = cy - (cy - offsetY) * (newH / imgH);
            imgW = newW;
            imgH = newH;
            updateImg();
          };

          const handleDown = (ex, ey) => { isDragging = true; startX = ex - offsetX; startY = ey - offsetY; };
          const handleMove = (ex, ey) => { if (!isDragging) return; offsetX = ex - startX; offsetY = ey - startY; updateImg(); };
          const handleUp = () => { isDragging = false; };

          cropImg.onmousedown = (ev) => { ev.preventDefault(); handleDown(ev.clientX, ev.clientY); };
          window.addEventListener('mousemove', (ev) => handleMove(ev.clientX, ev.clientY));
          window.addEventListener('mouseup', handleUp);
          cropImg.ontouchstart = (ev) => { const t = ev.touches[0]; handleDown(t.clientX, t.clientY); };
          cropImg.ontouchmove = (ev) => { ev.preventDefault(); const t = ev.touches[0]; handleMove(t.clientX, t.clientY); };
          cropImg.ontouchend = handleUp;

          document.getElementById('cropConfirm').onclick = async () => {
            const canvas = document.createElement('canvas');
            const size = 240;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const circleX = (containerSize / 2 - offsetX) / (imgW / img.width);
            const circleY = (containerSize / 2 - offsetY) / (imgH / img.height);
            const circleR = (size / 2) / (imgW / img.width);
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(img, circleX - circleR, circleY - circleR, circleR * 2, circleR * 2, 0, 0, size, size);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/webp', 0.85));
            elements.cropModal.classList.add('hidden');
            try {
              const uid = auth.currentUser.uid;
              const avatarRef = storageRef(storage, `avatars/${uid}`);
              try { await deleteObject(avatarRef); } catch { }
              await uploadBytes(avatarRef, blob, { contentType: 'image/webp' });
              const url = await getDownloadURL(avatarRef);
              await update(ref(db, `users/${uid}/profile`), { avatarUrl: url });
              const avatarArea = document.getElementById('profileAvatarArea');
              if (avatarArea) avatarArea.innerHTML = `<div style="position:relative;display:inline-block;"><img class="profile-modal-avatar" src="${url}" alt="">${AVATAR_OVERLAY_HTML}</div>`;
              appState.profileDirty = false;
              showModal({ title: '完成', content: '頭像已更新' });
            } catch { showModal({ title: '錯誤', content: '上傳失敗' }); }
          };

          document.getElementById('cropCancel').onclick = () => {
            elements.cropModal.classList.add('hidden');
          };
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function enterSelectMode(initialKey) {

      });

    function exitSelectMode() {
      appState.selectMode = false;
      appState.selectedMessages.clear();
      elements.selectBar.classList.add('hidden');
      document.querySelectorAll('.select-checkbox').forEach(el => el.remove());
      document.querySelectorAll('.chat-message.select-mode').forEach(el => el.classList.remove('select-mode'));
      requestAnimationFrame(() => {
        elements.messagesBox.scrollTo({ top: elements.messagesBox.scrollHeight, behavior: 'instant' });

    function toggleSelect(key) {
      if (appState.selectedMessages.has(key)) appState.selectedMessages.delete(key);
      else appState.selectedMessages.add(key);
      const cb = document.querySelector(`.select-checkbox[data-msg-key="${key}"]`);
      if (cb) cb.classList.toggle('checked', appState.selectedMessages.has(key));
      updateSelectBar();
      if (appState.selectedMessages.size === 0) exitSelectMode();

      elements.selectBar.querySelector('.select-bar-text').textContent = `已選取 ${appState.selectedMessages.size} 條訊息`;
    }

    function renderWithMentions(text) {
      if (!text) return '';
      const usersByNick = new Map();
      Array.from(appState.users.values()).forEach(u => usersByNick.set(u.nickname, u.uid));

      const escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      let rendered = escaped.replace(/(^|\s)@([\p{L}\p{N}_-]{3,24})/gu, (m, sp, name) => {
        if (name === 'everyone') return `${sp}<span class="mention">@everyone</span>`;
        const uid = usersByNick.get(name);
        return uid ? `${sp}<span class="mention" data-uid="${uid}">@${name}</span>` : m;
      });
      rendered = rendered.replace(/(https?:\/\/[^\s<]+)/g, (url) => {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="chat-link" data-url="${url}">${url}</a>`;
      });
      return rendered;
    }

    function setupPresence(uid) {
      const connectedRef = ref(db, '.info/connected');
      const statusRef = ref(db, `status/${uid}`);
      onValue(connectedRef, async (snap) => {
        if (snap.val() === false) return;
        const profileSnap = await get(ref(db, `users/${uid}/profile/statusMode`));
        const mode = profileSnap.val() || 'online';
        myConnectionRef = push(ref(db, `status/${uid}/connections`));
        const myDisconnect = onDisconnect(myConnectionRef);
        myDisconnect.remove().then(() => {
          set(myConnectionRef, true);
          update(statusRef, {
            mode: mode,
            lastChanged: serverTimestamp()
          });
        });
      });
    }

    function setUserStatusMode(mode) {
      const uid = appState.currentUser.uid;
      const statusRef = ref(db, `status/${uid}`);
      update(statusRef, {
        mode: mode,
        lastChanged: serverTimestamp()
      });
    }

    let _audioCtx = null;
    async function getAudioContext() {
      if (!_audioCtx || _audioCtx.state === 'closed') {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (_audioCtx.state === 'suspended') {
        try {
          await _audioCtx.resume();
        } catch (e) {}
      }
      return _audioCtx;
    }

    document.addEventListener('touchstart', () => { getAudioContext(); }, { once: true, passive: true });
    document.addEventListener('click', () => { getAudioContext(); }, { once: true, passive: true });

    async function playNotificationSound() {
      try {
        const ctx = await getAudioContext();
        if (ctx.state === 'suspended') return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(587.33, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.35);
      } catch (e) {}
    }

    function triggerNotification(msg) {
      if (appState.isInitialising) return;
      if (msg.uid === appState.currentUser.uid) return;
      const profile = appState.users.get(appState.currentUser.uid);
      const myMode = profile?.statusMode || 'online';
      if (myMode === 'dnd') return;
      const prefs = JSON.parse(localStorage.getItem('notificationPrefs') || '{"push":true,"sound":true}');
      if (prefs.sound) playNotificationSound();
      if (prefs.push && document.hidden) {
        const sender = appState.users.get(msg.uid)?.nickname || msg.nickname || '使用者';
        const msgContent = msg.type === 'gif' ? '傳送了一張 GIF' : msg.text;
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
          navigator.serviceWorker.ready.then(reg => {
            reg.showNotification('新訊息 - SimpleChat', {
              body: `${sender}: ${msgContent}`,
              icon: 'icon/icon-512x512.png'
            });
          });
        } else if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('新訊息 - SimpleChat', {
            body: `${sender}: ${msgContent}`,
            icon: 'icon/icon-512x512.png'
          });
        }
      }
    }
    function fmt(ts) { return ts ? new Date(ts).toLocaleString() : '—'; }

        try {
          await reload(auth.currentUser);
          appState.currentUser = auth.currentUser;
          updateAndRenderUI();
        } catch (e) {
        }
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        checkEmailVerifiedStatus();
      }
    });

    window.addEventListener('focus', () => {
      checkEmailVerifiedStatus();
    });

    setInterval(checkEmailVerifiedStatus, 3000);
  </script>
  <script>

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
    const EMOJIS = [
      '💀', '☠️', '🖕', '💩', '🤓', '👌', '🔥', '😇', '🤡', '👍',
      '😀', '😂', '🤣', '😊', '😍', '🥰', '😘', '😎', '🤩', '🥳',
      '😏', '😒', '😔', '😢', '😭', '😤', '🤯', '😱', '🥶', '🤢',
      '😈', '👿', '🤮', '🥴', '🙄', '😴', '🤤', '😬', '🫠', '🫡',
      '🫣', '🫢', '🤫', '🤔', '👎', '👏', '🙌', '🤝', '✌️', '🤞',
      '💪', '🙏', '👋', '🤙', '✋', '🫶', '🤟', '🤘', '👊', '🫰',
      '🤌', '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '💔',
      '❤️‍🔥', '⭐', '🎉', '🎊', '💯', '✅', '❌', '⚠️', '💬', '👀',
      '👻', '🤖', '👽', '🐶', '🐱', '🌈', '☀️', '🌙', '🍕', '🍺',
    ];
    const emojiGrid = document.querySelector('.emoji-grid');
    const emojiPanel = document.getElementById('emojiPanel');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiCloseBtn = document.getElementById('emojiClose');
    let savedSelectionRange = null;
    document.addEventListener('selectionchange', () => {
      const selection = window.getSelection();
      const input = document.getElementById('messageInput');
      if (selection.rangeCount > 0 && selection.focusNode && input && input.contains(selection.focusNode)) {
        savedSelectionRange = selection.getRangeAt(0);
      }
    });

    EMOJIS.forEach(em => {
      const span = document.createElement('span');
      span.className = 'emoji-item';
      span.textContent = em;
      
      const insertEm = (e) => {
        if (e) e.preventDefault();
        const input = document.getElementById('messageInput');
        input.focus();
        if (savedSelectionRange) {
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(savedSelectionRange);
        } else if (input.childNodes.length > 0) {
          const range = document.createRange();
          range.selectNodeContents(input);
          range.collapse(false);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
        }
        document.execCommand('insertText', false, em);
      };

      span.addEventListener('mousedown', e => e.preventDefault());
      span.addEventListener('touchstart', (e) => { e.preventDefault(); insertEm(); }, { passive: false });
      span.onclick = insertEm;
      emojiGrid.appendChild(span);
    });
    function hideEmojiPanel() { emojiPanel.classList.add('hidden'); }
    emojiBtn.onclick = () => {
      emojiPanel.classList.toggle('hidden');
      if (!emojiPanel.classList.contains('hidden')) {
        const input = document.getElementById('messageInput');
        input.focus();
        if (savedSelectionRange) {
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(savedSelectionRange);
        }
        if (document.getElementById('tabGif').classList.contains('active') && document.getElementById('gifSearchInput').value === '') {
          loadGifs();
        }
      }
    };
    emojiCloseBtn.onclick = hideEmojiPanel;

    document.addEventListener('click', (e) => {
      if (emojiPanel.classList.contains('hidden')) return;
      if (emojiPanel.contains(e.target) || emojiBtn.contains(e.target) || elements.inputEl.contains(e.target)) return;
      hideEmojiPanel();
    });

    const tabEmoji = document.getElementById('tabEmoji');
    const tabGif = document.getElementById('tabGif');
    const emojiContainer = document.getElementById('emojiContainer');
    const gifContainer = document.getElementById('gifContainer');
    const gifSearchInput = document.getElementById('gifSearchInput');
    const gifGrid = document.getElementById('gifGrid');

    tabEmoji.onclick = () => {
      tabEmoji.classList.add('active');
      tabGif.classList.remove('active');
      emojiContainer.classList.remove('hidden');
      gifContainer.classList.add('hidden');
    };

    tabGif.onclick = () => {
      tabGif.classList.add('active');
      tabEmoji.classList.remove('active');
      gifContainer.classList.remove('hidden');
      emojiContainer.classList.add('hidden');
      if (gifGrid.innerHTML === '') loadGifs();
    };

    let gifDebounceTimer = null;
    gifSearchInput.addEventListener('input', () => {
      clearTimeout(gifDebounceTimer);
      gifDebounceTimer = setTimeout(() => loadGifs(gifSearchInput.value.trim()), 500);
    });

    let gifNextCursor = '';
    let isFetchingGifs = false;
    let currentGifQuery = '';

    async function loadGifs(query = '', append = false) {
      if (isFetchingGifs) return;
      isFetchingGifs = true;
      currentGifQuery = query;

      if (!append) {
        gifGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:10px;color:var(--muted);">載入中...</div>';
        gifNextCursor = '';
      }

      try {
        let items = [];
        let endpoint = '';
        
        if (!query) {
          endpoint = `https://g.tenor.com/v1/trending?key=LIVDSRZULELA&limit=20&pos=${gifNextCursor}`;
        } else {
          endpoint = `https://g.tenor.com/v1/search?q=${encodeURIComponent(query)}&key=LIVDSRZULELA&limit=20&locale=zh_TW&pos=${gifNextCursor}`;
        }
        
        if (endpoint) {
          const res = await fetch(endpoint);
          const data = await res.json();
           items = data.results.map(r => ({ preview: r.media[0].tinygif.url, full: r.media[0].mediumgif.url, width: r.media[0].tinygif.dims[0], height: r.media[0].tinygif.dims[1] }));
          gifNextCursor = data.next || '';
        }

        if (!query && !append) {
          const saved = JSON.parse(localStorage.getItem('frequentGifs') || '[]');
          const savedItems = saved.map(s => typeof s === 'string' ? { preview: s, full: s } : s);
          const allPreviews = new Set();
          const merged = [];
          savedItems.concat(items).forEach(it => {
            if (!allPreviews.has(it.preview)) {
              allPreviews.add(it.preview);
              merged.push(it);
            }
          });
          items = merged;
        }
        
        if (!append && items.length === 0) {
          gifGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:10px;color:var(--muted);">找不到 GIF</div>';
          isFetchingGifs = false;
          return;
        }

        if (!append) gifGrid.innerHTML = '';
        items.forEach(item => {
          const img = document.createElement('img');
          img.className = 'gif-item';
          img.src = item.preview;
          img.loading = 'lazy';
          img.onclick = () => {
            window.sendGifMessage(item.full, item.width, item.height);
            let saved = JSON.parse(localStorage.getItem('frequentGifs') || '[]');
            saved = saved.map(s => typeof s === 'string' ? { preview: s, full: s } : s);
            saved = [item, ...saved.filter(s => s.preview !== item.preview)].slice(0, 20);
            localStorage.setItem('frequentGifs', JSON.stringify(saved));
          };
          gifGrid.appendChild(img);
        });
      } catch (e) {
        if (!append) gifGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:10px;color:var(--danger);">載入失敗</div>';
      }
      isFetchingGifs = false;
    }

    gifGrid.addEventListener('scroll', () => {
      if (gifNextCursor && gifGrid.scrollHeight - gifGrid.scrollTop <= gifGrid.clientHeight + 50) {
        loadGifs(currentGifQuery, true);
      }
    });
    const appEl = document.querySelector('.app');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    document.getElementById('toggleSidebarBtn').onclick = () => {
      appEl.classList.toggle('sidebar-open');
    };
    sidebarOverlay.onclick = () => {
      appEl.classList.remove('sidebar-open');
    };
    if (window.innerWidth <= 768) {
      appEl.classList.remove('sidebar-open');
    }
  </script>
  <script>
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }
    setAppHeight();
    window.addEventListener('resize', setAppHeight);
  </script>
</body>
